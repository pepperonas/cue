# cue — nginx reverse proxy for cue.celox.io
#
# 1. Place at /etc/nginx/sites-available/cue and symlink into sites-enabled.
# 2. Obtain a cert:  certbot --nginx -d cue.celox.io
#    (certbot fills in the ssl_certificate lines + the :80 -> :443 redirect).
# 3. Test + reload:  nginx -t && systemctl reload nginx
#
# The app (container) listens on 127.0.0.1:8791 and sets its own CSP +
# security headers; nginx only adds HSTS.

server {
    listen 80;
    server_name cue.celox.io;
    # certbot adds the redirect to https here.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name cue.celox.io;

    # Managed by certbot:
    # ssl_certificate     /etc/letsencrypt/live/cue.celox.io/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cue.celox.io/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Allow large-ish .txt imports.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8791;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
