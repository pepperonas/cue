              - generic [ref=e66]: "# Feature: EDR-Erweiterung des bestehenden Brightness-Commands (macOS-only) ## Ziel Erweitere den BESTEHENDEN `brightness` command in der Preview-Sektion so, dass er auf macOS mit EDR-fähigem Display über das normale SDR-Maximum hinausgeht (Richtung 1000 nits), wie bei Vivid. Der vorhandene Brightness-Slider bleibt EIN Control – auf tauglichen Macs reicht sein Bereich einfach weiter nach oben. Auf Windows/Linux ändert sich NICHTS: keine zusätzlichen Optionen, keine EDR-UI. ## Funktionsprinzip macOS begrenzt SDR-Content auf ~SDR-Max. EDR-fähige XDR-Panels können 1000 nits sustained / 1600 peak, aber nur wenn EDR-Content am Screen liegt. Sobald eine CAMetalLayer-Surface mit wantsExtendedDynamicRangeContent Pixel mit Komponentenwerten > 1.0 zeigt, gibt macOS den Backlight-Headroom frei. Wir nutzen ein bildschirmfüllendes, klick-durchlässiges EDR-Overlay, das den darunterliegenden Inhalt in den erweiterten Bereich hebt. (1.0 = 100 nits, 10.0 = 1000 nits.) ## Stack / Plattform-Gating - inspector-rust (Tauri 2 + Rust + React). - Native macOS-Interop NUR über objc2-Ökosystem: objc2, objc2-app-kit, objc2-metal, objc2-quartz-core, objc2-foundation. (NICHT cocoa/metal-Altstack, nicht mischen.) - Gesamter EDR-Code hinter #[cfg(target_os = \"macos\")]. Auf anderen Plattformen wird er nicht kompiliert. - React: EDR-bezogene UI-Teile NUR rendern, wenn Backend meldet platform == macOS UND Display EDR-fähig. Sonst verhält sich der Brightness-Slider exakt wie bisher. ## Integration in bestehenden Brightness-Command - Den vorhandenen Command NICHT duplizieren, sondern erweitern: - Auf macOS + EDR-fähig: der Slider-Wertebereich reicht über den bisherigen 100%-Punkt hinaus bis zum erkannten EDR-Maximum. Werte ≤ SDR-Max → wie bisher (bestehender Pfad). Werte darüber → EDR-Overlay aktivieren/skalieren. - Auf macOS ohne EDR-Display, Windows, Linux: identisches Verhalten wie heute, Bereich endet beim bisherigen Maximum. - Ein einziger Brightness-State steuert beides; der Übergang SDR→EDR muss für den Nutzer nahtlos sein (kein zweiter Regler). ## EDR-Capability-Detection (macOS) - Beim Init der Preview-Sektion + bei NSApplicationDidChangeScreenParametersNotification: maximumPotentialExtendedDynamicRangeColorComponentValue des aktiven NSScreen abfragen. > 1.0 ⇒ EDR verfügbar, sonst nicht. - Kein Modell-Hardcoding (M-Chip ≠ automatisch EDR; nur 14\"/16\" MBP XDR & XDR-Displays können es). Runtime-Detection ist maßgeblich. - Erkanntes Maximum (in nits) bestimmt das obere Slider-Ende. ## Native EDR-Overlay (Rust/objc2/Metal) - Borderless, transparentes NSWindow: - ignoresMouseEvents = true (klick-durchlässig). - window level über normalen Fenstern, klaut keinen Fokus. - collectionBehavior: alle Spaces, eigener Space = nein. - bildschirmfüllend auf dem aktiven Screen. - View mit CAMetalLayer: - wantsExtendedDynamicRangeContent = true - pixelFormat = MTLPixelFormat::RGBA16Float - colorspace = extendedLinearDisplayP3 - Render-Loop hebt Luminanz in den EDR-Bereich (>1.0), Stärke = Funktion des Slider-Werts oberhalb SDR-Max. Pro Frame maximumExtendedDynamicRangeColorComponentValue lesen und Ziel dagegen clampen (kein Clipping). - Overlay nur existent, solange Slider im EDR-Bereich steht; bei Rückkehr unter SDR-Max sauber abbauen. ## Warnhinweise (nur sichtbar, wenn EDR-Bereich genutzt wird) - Erhöht Display-Temperatur (~5–10 %) und Akkuverbrauch deutlich. - Farbwiedergabe kann leicht abweichen. - macOS limitiert Helligkeit bei Hitze ggf. selbst. - macOS 26 Tahoe: „Automatically Adjust Brightness\" muss in den System-Display-Einstellungen aktiv sein, sonst greift EDR nicht. ## Edge Cases - Display-/Screen-Wechsel: EDR-Fähigkeit pro Screen neu prüfen, Overlay auf korrektem Screen neu erzeugen. - Sleep/Wake (v. a. Tahoe): Headroom kann auf 1.0 zurückfallen → Overlay zwangs-neu-aufbauen statt nur Flag prüfen. - App-Quit / Slider zurück in SDR: Overlay-Window zuverlässig schließen. - Mehrere EDR-Screens: mindestens sauber auf aktiven Screen begrenzt. ## Architektur - Rust (macOS, cfg-gated): NSWindow/CAMetalLayer-Setup, Metal-Render-Loop, NSScreen-Abfragen, Notification-Observer. Erweiterung der bestehenden Brightness-Tauri-Commands um EDR-Capability + erweiterten Bereich. - React: Slider-Bereich dynamisch ans Backend-gemeldete Maximum koppeln; EDR-UI/Warnungen nur bei macOS + EDR-fähig. © 2026 Martin Pfeffer | celox.io"
