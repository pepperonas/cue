              - generic [ref=e113]: "# Feature: Moom-Style Hexgrid Window Palette (macOS) ## Ziel Implementiere eine Hover-Palette über dem grünen Zoom/Maximize-Button von App-Fenstern (wie Moom). Beim Hovern erscheint ein Overlay mit: 1. einer Reihe Standard-Preset-Icons (Maximize, Halves, Quarters) 2. einem Hexgrid darunter, über das per Drag ein beliebiger Rechteck-Bereich „aufgemalt\" wird → Fenster snappt in diesen Bereich. ## Stack / Kontext - inspector-rust (Tauri 2 + Rust + React), macOS-Target. - Fremd-Fenster manipulieren via Accessibility-API (AXUIElement: kAXPositionAttribute / kAXSizeAttribute). - Grünen Button lokalisieren via AX: kAXFullScreenButtonAttribute bzw. kAXZoomButtonAttribute des fokussierten/gehoverten Fensters → dessen AXFrame als Anker für die Palette. - Overlay als natives transparentes, klick-durchlässig-konfigurierbares NSWindow auf hohem Window-Level (über allen App-Fenstern). ## Trigger (Hover-Erkennung) - Globaler Mouse-Move-Monitor. Ermittle das Fenster unter dem Cursor und dessen Zoom-Button-Frame (AX). - Cursor verweilt ≥ Hover-Delay (Default 0.15–0.2 s) über dem Zoom-Button → Palette einblenden, verankert direkt unter/an dem Button. - Cursor verlässt Button UND Palette für > Grace-Delay (z. B. 0.25 s) → Palette ausblenden. (Grace nötig, damit Weg Button→Palette nicht schließt.) ## Palette-Aufbau ### A) Preset-Icons (obere Reihe) Klickbare Symbole, je ein Standard-Layout. Klick → Fenster sofort resizen/positionieren, Palette schließen. - Maximize (voller visibleFrame) - Linke Hälfte / Rechte Hälfte - Obere Hälfte / Untere Hälfte - Mit gehaltenem Modifier (z. B. Option) → Quarter-Varianten der 4 Ecken einblenden statt der Halves. - Center (optional) ### B) Hexgrid (Hauptfeature, unter den Icons) - Ein Gitter aus versetzten Sechsecken (Moom-Stil: Hex-Tiling, kein Rechteck-Raster) — kürzere Mauswege, „natürlichere\" Drag-Richtungen. - Das Gesamt-Gitter repräsentiert maßstäblich den Ziel-Screen (visibleFrame des Screens, auf dem das Fenster liegt). - Konfigurierbare Dichte: horizontale × vertikale Zellen (Default z. B. 8×6; per Settings bis ~16×12). Aspect-Ratio des Grids = Aspect-Ratio des Ziel-Screens. #### Interaktion - Maus-Down auf einer Start-Hexzelle, Drag zu einer End-Hexzelle → rechteckiger Auswahlbereich (Bounding-Box der überstrichenen Zellen) füllt sich dunkel/akzentfarben. - Live-Mapping: überstrichener Zellbereich → entsprechendes Rechteck im Screen-visibleFrame. - Maus-Up → gehovertes/zuletzt aktives Fenster wird auf dieses Rechteck (Position + Größe) gesetzt; Palette schließt. - Single-Klick auf eine Zelle = 1×1-Zellen-Auswahl (kleines Fenster in der Ecke). Klick-Drag über mehrere Zellen = größerer Bereich. #### Optionaler Live-Screen-Preview - Während des Hexgrid-Drags zusätzlich ein dezenter Outline-Rahmen direkt auf dem Screen am künftigen Zielbereich (analog zum vorhandenen Snap-Overlay-Feature), damit man 1:1 sieht, wo das Fenster landet. ## Technische Anforderungen - Accessibility-Permission prüfen/anfordern (AXIsProcessTrustedWithOptions). - visibleFrame des korrekten NSScreen verwenden (Menüleiste + Dock raus). - Koordinaten sauber zwischen AX (top-left origin) und Cocoa (bottom-left origin) umrechnen. - Multi-Monitor: Grid bildet den Screen ab, auf dem das Zielfenster liegt; Palette korrekt auf dem jeweiligen Screen positionieren. - Button-Frame near Screen-Edge: Palette-Position clampen, damit sie nicht off-screen rutscht (bekannter Moom-Edgecase rechts/unten). - Optionaler Spacing-Wert (Gaps zwischen Fenstern / zu Display-Rändern). ## Settings (UI in inspector-rust) - Hexgrid Cell-Density (H × V) einstellbar. - Hover-Delay + Grace-Delay (Slider). - Modifier für Quarter-Presets wählbar. - Farbschema des Overlays (White / B&W / macOS-Accent). - Toggle: Live-Screen-Outline-Preview an/aus. - Toggle: Gesamtes Feature an/aus + Per-App-Blacklist. ## Edge Cases - Fenster mit fixer Mindest-/Maxgröße: nach Resize zentriert auf Zielbereich anchorn statt zu verzerren. - ESC während Hexgrid-Drag → abbrechen, Palette + Preview weg. - Fenster ohne sichtbaren Zoom-Button (Dialoge) → Palette nicht zeigen. - App im Vollbild-Space → Feature aussetzen. - Schnelles Cursor-Movement darf keine Zelle „kleben\" lassen. ## Architektur-Hinweis - Rust-Seite: AX-Zugriff, Screen-Geometrie, Fenster-Resize, globaler Event-Tap, Overlay-NSWindow-Steuerung. - React-Seite: nur Settings-UI. Die Palette selbst sollte performant nativ gerendert werden (NSView/Canvas im Overlay-NSWindow), nicht als langsames WebView-Overlay, da sie verzögerungsfrei dem Hover folgen muss. © 2026 Martin Pfeffer | celox.io"
