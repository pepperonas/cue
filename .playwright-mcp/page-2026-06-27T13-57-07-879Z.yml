            - generic [ref=e96]: "# Feature: \"boom\" Command — Audio-Enhancement & Volume-Boost (macOS, treiberlos) ## Ziel Neuer eigenständiger Command `boom` in inspector-rust: macht die Audio-Ausgabe des Macs präsenter, hochwertiger und lauter — wie Boom 3D, aber OUT OF THE BOX ohne externen Treiber (kein BlackHole, kein HAL-Plugin-Install). Funktionen: systemweiter Equalizer mit vielen optimalen Presets, DSP-Enhancement, Volume-Boost über das System-Limit. Eigener Command, NICHT Teil von brightness oder anderen Commands. ## Kernentscheidung: Core-Audio-Process-Taps (kein Treiber) - Systemweites Audio wird über Apples Process-Tap-API abgegriffen (macOS 14.2+). KEIN virtueller HAL-Treiber, KEIN BlackHole, KEINE Admin-Installation. Nur einmalige System-Audio-Aufnahme-Permission. - Mechanik: 1. CATapDescription mit leerer Prozessliste + exclusive/global → tappt alle Prozesse des Default-Output-Geräts. 2. muteBehavior = MUTED → Original-Ausgabe wird stummgeschaltet, sodass NUR unser verarbeitetes Signal hörbar ist (kein Doppel-Audio). 3. AudioHardwareCreateProcessTap → Tap-AudioObjectID. 4. Privates Aggregate-Device (kAudioAggregateDeviceIsPrivateKey=true, erscheint nicht global) mit dem Tap als Sub-Tap; Default-Output als Main-Sub-Device-Anchor (kAudioAggregateDeviceMainSubDeviceKey). 5. AudioDeviceCreateIOProcIDWithBlock → Realtime-Callback: capture → DSP → Ausgabe ans echte Output-Device. - Plattform-Minimum macOS 14.2+ klar kommunizieren; darunter Feature deaktiviert anzeigen. ## Plattform-Gating - Gesamter Audio-/CoreAudio-Code hinter #[cfg(target_os = \"macos\")]. - React: `boom`-UI nur bei platform == macOS UND macOS >= 14.2 UND Tap-Permission erteilbar. Windows/Linux: existiert nicht. ## Permission-Flow (so einfach wie möglich) - Beim ersten Aktivieren: System-Audio-Capture-Permission anfragen (TCC). Klarer Onboarding-Hinweis, was passiert und warum. - Permission verweigert → freundlicher Zustand mit Button \"in Systemeinstellungen öffnen\". Kein Crash, kein Loop. - Kein Mikrofon-Prompt nötig (Tap-API ist System-Audio, nicht Mic). ## Audio-Routing - Aktivierung: Tap + privates Aggregate-Device aufbauen, IOProc starten; aktuelles echtes Output-Device als Render-Ziel merken. - Deaktivierung/Quit/Crash: IOProc stoppen, Aggregate-Device + Tap sauber zerstören, Original-Ausgabe wiederherstellen (Watchdog/Cleanup — der Mac darf NIE stumm zurückbleiben). - Output-Wechsel live erkennen (Speaker → AirPods → HDMI): Render-Ziel nachziehen; Tap/Aggregate ggf. neu aufbauen. ## DSP-Engine (Rust, im IOProc) - Verarbeitung nativ in Rust. IOProc-Callback läuft auf dem Realtime- Audio-Thread → KEINE Allocations, KEINE Locks, KEINE UI-Calls im Callback (sonst Dropouts). Parameter lock-free übergeben (z. B. atomics / SPSC-Ringpuffer). - Signalkette pro Block: 1. Pre-Amp / Input-Gain. 2. EQ: 10-Band (einfach) + bis 31-Band (advanced), Biquads, je Band Frequenz/Gain/Q, L/R getrennt regelbar. 3. Enhancement (einzeln zuschaltbar, je Intensity-Slider): - Bass-Enhancement (psychoakustische Oberton-Synthese — Air-Speaker bekommen mehr wahrgenommenen Bass ohne Chassis-Überlast). - Fidelity (hebt schwächere Frequenzbänder, bessere Balance). - Ambience (Raum/Reflexion, hörbarer in lauter Umgebung). - Clarity/Presence (Dialog-/Vocal-Verständlichkeit). - Night-Mode (Dynamik-Kompression). 4. Volume-Boost: globaler Make-up-Gain über 100 % hinaus. 5. Limiter / Soft-Clipper am ENDE: PFLICHT — verzerrungsfrei + schützt interne Speaker. ## Equalizer-UI (React) - Graphic-EQ, Umschalter 10/31-Band, dragbare Slider je Band + Frequenz-Label, optional EQ-Kurve. L/R-Toggle. Pre-Amp-Slider. - Live Input/Output-Level-Meter mit Clip-Indikator. ## Presets (viele, optimal) - Genre: Flat, Bass Boost, Treble Boost, Vocal, Rock, Pop, Electronic/House, Hip-Hop, Jazz, Classical, Acoustic, Podcast/Speech, Movie, Gaming, Loudness. - Geräte-/Speaker-Korrektur: MacBook Air Speaker, MacBook Pro Speaker, In-Ear, Over-Ear, Bluetooth — Default-Vorschlag nach erkanntem Output. - Custom-Presets: anlegen/benennen/speichern, Import/Export. ## Volume-Boost (max. Lautstärke erhöhen) - Separater Boost-Slider: 0 %…Max, mit sichtbarer 100%-Markierung (Tick am System-Normal; darüber = Boost-Bereich). - Optional \"Controlled Boost\": Limiter aggressiver für verzerrungsfreien High-Boost. - Warnhinweis im Boost-Bereich: Dauer-Boost kann interne Speaker belasten. ## \"Out of the box / max. Verbesserung\" — Smart Defaults - Beim ersten Start: internes Speaker-Modell erkennen (Air vs. Pro) und passendes Enhancement-Preset automatisch aktivieren (Bass-Synthese + Presence-Lift + sicherer Boost + Limiter) → sofort hörbar besser, ohne dass der User etwas einstellen muss. - Ein-Klick \"Boom an/aus\". Alles Weitere optional. ## Edge Cases (Tap-API-spezifisch!) - All-Zero-Stream-Bug: Stream kann nach längerer Laufzeit / Sample-Rate- Wechsel / Bluetooth-Sleep-Wake auf komplett 0.0 kippen (Air häufiger als Pro). Erkennung via RMS-Monitoring; Recovery NUR durch vollständigen Teardown+Rebuild (AudioDeviceStop → DestroyIOProcID → DestroyAggregateDevice → DestroyProcessTap → alles neu). - Sample-Rate-Wechsel (44.1↔48 kHz) → Tap+Aggregate neu aufbauen. - Bluetooth-Latenz: Hinweis, dass Enhancement primär für interne Speaker optimal ist. - Output-Pegel-Attenuation bei Multi-Out-Geräten beachten (Tap kann je nach Stereo-Paar-Anzahl gedämpft liefern) → ggf. kompensieren. - Permission verweigert → Setup-Zustand, kein Fehler. ## Architektur - Rust (macOS, cfg-gated): CATapDescription/ProcessTap/Aggregate-Setup via objc2-core-audio bzw. coreaudio-rs, Realtime-IOProc, DSP-Kette (Pre-Amp, Biquad-EQ, Enhancement, Boost, Limiter), Device-/Permission- Management, RMS-Watchdog, boom-Tauri-Commands. - React: EQ-UI, Presets, Boost-Slider, Effekt-Toggles, Meter — nur via Tauri-Commands/Events. ## Hinweis Distribution - Funktioniert für Direktvertrieb (GitHub-Build) problemlos. Tap-API ist offizielle Apple-API — keine private API, kein Kext, kein Treiber-Signing. © 2026 Martin Pfeffer | celox.io"
